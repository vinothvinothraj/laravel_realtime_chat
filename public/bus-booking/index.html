<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Booking</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script defer src="assets/app.js"></script>
</head>
<body data-page="search">
    <main class="screen stack">
        <div>
            <div class="pill">Mobile booking</div>
            <h1 class="title">Search your bus trip</h1>
            <p class="muted">Find a trip and continue through seat selection and checkout.</p>
        </div>
        <div class="card stack">
            <form data-search-form class="stack">
                <input class="input" name="origin" placeholder="From">
                <input class="input" name="destination" placeholder="To">
                <input class="input" name="travel_date" type="date">
                <button class="button" type="submit">Search buses</button>
            </form>
        </div>
        <div class="muted small" data-error></div>
    </main>
</body>
</html>
