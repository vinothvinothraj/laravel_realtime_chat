<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script defer src="assets/app.js"></script>
</head>
<body data-page="success">
    <main class="screen stack">
        <header class="mobile-header">
            <div class="brand-block">
                <div class="brand-mark">BUS</div>
                <div class="brand-text">
                    <div class="brand-name">Bus Booking</div>
                    <div class="brand-subtitle">Booking confirmed</div>
                </div>
            </div>
            <span class="pill">Done</span>
        </header>

        <section class="mobile-content content-pad">
            <div class="page-header">
                <div class="pill">Confirmed</div>
                <h1 class="title">Booking successful</h1>
            </div>
            <div data-success></div>
            <div class="muted small" data-error></div>
        </section>

        <footer class="mobile-footer">
            <div class="footer-copy">
                <div class="footer-title">All set</div>
                <div class="footer-subtitle">View your ticket or start again</div>
            </div>
            <div class="footer-actions">
                <a class="button secondary" href="index.html">Home</a>
            </div>
        </footer>
    </main>
</body>
</html>
